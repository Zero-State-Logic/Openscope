<svg width="460" height="120" viewBox="0 0 460 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <title>OpenScope logo</title>
  <desc>The OpenScope logo: a small dark oscilloscope-screen icon showing a green waveform, beside the OpenScope wordmark on a dark panel.</desc>
  <defs>
    <filter id="lglow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ic"><rect x="24" y="24" width="72" height="72" rx="16"/></clipPath>
  </defs>
  <rect x="0.5" y="0.5" width="459" height="119" rx="22" fill="#0B0E14" stroke="#1E2636"/>
  <rect x="24" y="24" width="72" height="72" rx="16" fill="#0A0F18" stroke="#28d39e" stroke-opacity="0.45"/>
  <g clip-path="url(#ic)">
    <g stroke="#1B2433" stroke-width="1">
      <line x1="48" y1="24" x2="48" y2="96"/><line x1="72" y1="24" x2="72" y2="96"/>
      <line x1="24" y1="48" x2="96" y2="48"/><line x1="24" y1="72" x2="96" y2="72"/>
    </g>
    <path d="M30 64 Q42 44 54 60 Q66 76 78 52 Q86 38 90 60" fill="none" stroke="#34D399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#lglow)"/>
  </g>
  <text x="116" y="68" font-size="40" font-weight="800" fill="#F4F6F8" letter-spacing="-1.5">OpenScope</text>
  <rect x="118" y="80" width="120" height="4" rx="2" fill="#34D399"/>
</svg>
