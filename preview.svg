  <!-- horizontal -->
  <rect x="884" y="72" width="372" height="72" rx="12" fill="#10151F" stroke="#1E2636"/>
  <text x="902" y="98" font-size="11" font-weight="600" fill="#6B7687" letter-spacing="0.5">HORIZONTAL</text>
  <text x="902" y="128" font-size="22" font-weight="700" fill="#F4F6F8">100 µs/div</text>
  <text x="1238" y="128" font-size="13" fill="#8A94A3" text-anchor="end">12.5 kpts</text>

  <!-- vertical -->
  <rect x="884" y="156" width="372" height="92" rx="12" fill="#10151F" stroke="#1E2636"/>
  <text x="902" y="182" font-size="11" font-weight="600" fill="#6B7687" letter-spacing="0.5">VERTICAL</text>
  <circle cx="908" cy="206" r="5" fill="#34D399"/><text x="922" y="211" font-size="15" fill="#C7D0DB">CH1</text>
  <text x="1238" y="211" font-size="15" font-weight="600" fill="#F4F6F8" text-anchor="end">1.00 V/div</text>
  <circle cx="908" cy="232" r="5" fill="#FBBF24"/><text x="922" y="237" font-size="15" fill="#C7D0DB">CH2</text>
  <text x="1238" y="237" font-size="15" font-weight="600" fill="#F4F6F8" text-anchor="end">0.50 V/div</text>

  <!-- trigger card -->
  <rect x="884" y="260" width="372" height="84" rx="12" fill="#10151F" stroke="#1E2636"/>
  <text x="902" y="286" font-size="11" font-weight="600" fill="#6B7687" letter-spacing="0.5">TRIGGER</text>
  <text x="902" y="318" font-size="22" font-weight="700" fill="#F4F6F8">Edge &#9650;</text>
  <text x="1238" y="300" font-size="13" fill="#8A94A3" text-anchor="end">Source CH1</text>
  <text x="1238" y="322" font-size="13" fill="#8A94A3" text-anchor="end">Level 1.20 V</text>

  <!-- measurements -->
  <rect x="884" y="356" width="372" height="148" rx="12" fill="#10151F" stroke="#1E2636"/>
  <text x="902" y="382" font-size="11" font-weight="600" fill="#6B7687" letter-spacing="0.5">MEASUREMENTS</text>
  <g>
    <text x="902" y="404" font-size="11" fill="#6B7687">Vpp</text><text x="902" y="424" font-size="18" font-weight="600" fill="#F4F6F8">3.28 V</text>
    <text x="1080" y="404" font-size="11" fill="#6B7687">Frequency</text><text x="1080" y="424" font-size="18" font-weight="600" fill="#F4F6F8">1.00 kHz</text>
    <text x="902" y="450" font-size="11" fill="#6B7687">Vrms</text><text x="902" y="470" font-size="18" font-weight="600" fill="#F4F6F8">1.16 V</text>
    <text x="1080" y="450" font-size="11" fill="#6B7687">Period</text><text x="1080" y="470" font-size="18" font-weight="600" fill="#F4F6F8">1.00 ms</text>
    <text x="902" y="494" font-size="11" fill="#6B7687">Duty</text><text x="948" y="494" font-size="14" font-weight="600" fill="#34D399">50.2%</text>
    <text x="1080" y="494" font-size="11" fill="#6B7687">Rise</text><text x="1124" y="494" font-size="14" font-weight="600" fill="#F4F6F8">12 µs</text>
  </g>

