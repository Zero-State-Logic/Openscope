  </g>
  <text x="86" y="92" font-size="13" font-weight="600" fill="#34D399">CH1</text>
  <text x="124" y="92" font-size="13" font-weight="600" fill="#FBBF24">CH2</text>
  <text x="856" y="92" font-size="13" fill="#6B7687" text-anchor="end">100 µs/div</text>
  <text x="86" y="480" font-size="12" fill="#8A94A3">Trig &#9650; CH1 · 1.20 V · rising</text>

