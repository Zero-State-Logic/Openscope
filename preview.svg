<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <title>Oscilla user interface preview</title>
  <desc>A mockup of the Oscilla oscilloscope web app: a top toolbar with live status and flash/export buttons, a left tool rail, a central scope screen showing a green sine wave and an amber square wave over a grid, a right panel with horizontal, vertical, trigger and measurement cards, a spectrum FFT panel, and a UART protocol decode table.</desc>
  <defs>
    <filter id="g" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="scr"><rect x="72" y="72" width="796" height="420" rx="10"/></clipPath>
  </defs>

  <rect x="0.5" y="0.5" width="1279" height="799" rx="18" fill="#0B0E14" stroke="#1E2636"/>

  <!-- top bar -->
  <rect x="16" y="14" width="28" height="28" rx="8" fill="#0A0F18" stroke="#28d39e" stroke-opacity="0.45"/>
  <path d="M21 30 Q25 23 29 29 Q33 35 39 25" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"/>
  <text x="54" y="36" font-size="20" font-weight="800" fill="#F4F6F8" letter-spacing="-0.5">Oscilla</text>

  <rect x="812" y="13" width="196" height="30" rx="15" fill="#0E1A16" stroke="#1f6b50"/>
  <circle cx="830" cy="28" r="4" fill="#34D399"/>
  <text x="844" y="32" font-size="13" font-weight="500" fill="#6ee7b7">Live · Pico @ 500 kS/s</text>
  <rect x="1018" y="13" width="120" height="30" rx="8" fill="#10241C" stroke="#28d39e" stroke-opacity="0.5"/>
  <text x="1078" y="32" font-size="13" font-weight="600" fill="#34D399" text-anchor="middle">Flash firmware</text>
  <rect x="1146" y="13" width="108" height="30" rx="8" fill="#121927" stroke="#2A3342"/>
  <text x="1200" y="32" font-size="13" fill="#C7D0DB" text-anchor="middle">Export CSV</text>

  <line x1="16" y1="56" x2="1264" y2="56" stroke="#161D2B"/>
  <line x1="56" y1="56" x2="56" y2="784" stroke="#161D2B"/>

  <!-- left rail -->
  <polygon points="22,78 22,92 34,85" fill="#34D399"/>
  <rect x="21" y="120" width="14" height="14" rx="2" fill="#6B7687"/>
  <polygon points="22,158 22,170 31,164" fill="#6B7687"/><rect x="33" y="156" width="3" height="16" fill="#6B7687"/>
  <line x1="16" y1="196" x2="42" y2="196" stroke="#1E2636"/>
  <rect x="4" y="214" width="48" height="36" rx="10" fill="#121927"/>
  <rect x="0" y="214" width="3" height="36" fill="#34D399"/>
  <path d="M16 232 Q22 224 28 232 Q34 240 40 232" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"/>
  <g fill="#6B7687"><rect x="18" y="272" width="4" height="10" rx="1"/><rect x="26" y="266" width="4" height="16" rx="1"/><rect x="34" y="270" width="4" height="12" rx="1"/></g>
  <path d="M16 308 H22 V302 H30 V308 H36" fill="none" stroke="#6B7687" stroke-width="1.5"/>
  <line x1="16" y1="338" x2="42" y2="338" stroke="#1E2636"/>
  <circle cx="28" cy="762" r="7" fill="none" stroke="#6B7687" stroke-width="1.5"/><circle cx="28" cy="762" r="2" fill="#6B7687"/>

  <!-- scope screen -->
  <rect x="72" y="72" width="796" height="420" rx="10" fill="#0A0F18" stroke="#1E2636"/>
  <g clip-path="url(#scr)">
    <g stroke="#151C29" stroke-width="1">
      <line x1="138" y1="72" x2="138" y2="492"/><line x1="205" y1="72" x2="205" y2="492"/><line x1="271" y1="72" x2="271" y2="492"/>
      <line x1="337" y1="72" x2="337" y2="492"/><line x1="404" y1="72" x2="404" y2="492"/><line x1="536" y1="72" x2="536" y2="492"/>
      <line x1="602" y1="72" x2="602" y2="492"/><line x1="669" y1="72" x2="669" y2="492"/><line x1="735" y1="72" x2="735" y2="492"/><line x1="801" y1="72" x2="801" y2="492"/>
      <line x1="72" y1="124" x2="868" y2="124"/><line x1="72" y1="177" x2="868" y2="177"/><line x1="72" y1="229" x2="868" y2="229"/>
      <line x1="72" y1="334" x2="868" y2="334"/><line x1="72" y1="387" x2="868" y2="387"/><line x1="72" y1="439" x2="868" y2="439"/>
    </g>
    <line x1="470" y1="72" x2="470" y2="492" stroke="#222B3A" stroke-width="1"/>
    <line x1="72" y1="282" x2="868" y2="282" stroke="#222B3A" stroke-width="1"/>

    <!-- trigger -->
    <line x1="72" y1="250" x2="868" y2="250" stroke="#F87171" stroke-width="1" stroke-dasharray="4 5" opacity="0.6"/>
    <path d="M72 244 L84 250 L72 256 Z" fill="#F87171"/>

    <!-- CH2 square (amber) -->
    <path d="M80 420 H140 V384 H200 V420 H260 V384 H320 V420 H380 V384 H440 V420 H500 V384 H560 V420 H620 V384 H680 V420 H740 V384 H800 V420 H860"
          fill="none" stroke="#FBBF24" stroke-width="2" stroke-linejoin="round" opacity="0.92"/>
    <!-- CH1 sine (emerald) -->
    <path d="M80 282 Q108 222 136 282 Q164 342 192 282 Q220 222 248 282 Q276 342 304 282 Q332 222 360 282 Q388 342 416 282 Q444 222 472 282 Q500 342 528 282 Q556 222 584 282 Q612 342 640 282 Q668 222 696 282 Q724 342 752 282 Q780 222 808 282 Q836 342 864 282"
