  <rect x="72" y="524" width="796" height="236" rx="12" fill="#0A0F18" stroke="#1E2636"/>
  <text x="86" y="550" font-size="11" font-weight="600" fill="#6B7687" letter-spacing="0.5">SPECTRUM · FFT</text>
  <text x="854" y="550" font-size="11" font-weight="600" fill="#34D399" text-anchor="end">CH1</text>
  <line x1="88" y1="720" x2="852" y2="720" stroke="#1E2636"/>
