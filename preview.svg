    <rect x="502" y="670" width="12" height="50" rx="2" opacity="0.85"/>
    <rect x="526" y="709" width="12" height="11" rx="2" opacity="0.35"/>
    <rect x="550" y="711" width="12" height="9" rx="2" opacity="0.35"/>
    <rect x="574" y="707" width="12" height="13" rx="2" opacity="0.35"/>
    <rect x="598" y="710" width="12" height="10" rx="2" opacity="0.35"/>
    <rect x="622" y="656" width="12" height="64" rx="2" opacity="0.8"/>
    <rect x="646" y="711" width="12" height="9" rx="2" opacity="0.35"/>
    <rect x="670" y="708" width="12" height="12" rx="2" opacity="0.35"/>
    <rect x="694" y="712" width="12" height="8" rx="2" opacity="0.35"/>
