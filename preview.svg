  <text x="902" y="550" font-size="11" font-weight="600" fill="#6B7687" letter-spacing="0.5">DECODE · UART</text>
  <text x="1238" y="550" font-size="11" fill="#8A94A3" text-anchor="end">9600 8N1</text>
